spring:
  application:
    name: "elfalyze"
  # Persistent H2 database:
  datasource:
    url: jdbc:h2:file:./data/elfalyze-dev
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  name: ${spring.application.name}
  version:
    major: 0
    minor: 1
    patch: 0
  file-storage:
    type: local
    params:
      root-dir: ./file-storage/dev
